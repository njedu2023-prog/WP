project_name: WP 尾盘收益排序系统
input_url: https://raw.githubusercontent.com/njedu2023-prog/a-share-top3-data/main/data/wp/latest/wp_latest_rank_input.csv
min_pct_chg: 8.0
min_amount: 100000000
top_n: 50
timezone: Asia/Shanghai
exclude_st: true
exclude_suspended: true
exclude_new_stock_days: 10
max_limit_up_pct: 10
buy_max_count: 1
buy_max_sector_positions: 1
tail_profit_min_pct_chg: 8
tail_profit_max_pct_chg: 12
tail_profit_max_risk_score: 45
tail_profit_min_close_position: 50
tail_profit_max_amount_ratio_5d: 2.5

# WP V2: T+1 OHLC empirical intervals. EOD backtests are low-weight priors
# until enough real 14:20-14:50 snapshots have next-day truth.
forecast_min_total_samples: 24
forecast_min_live_samples: 20
forecast_proxy_weight: 0.30
forecast_round_trip_cost_pct: 0.20
forecast_downside_penalty: 0.20

# Human decision support. A failed final check explicitly allows no trade.
regime_allow_score: 55
regime_avoid_score: 40
regime_min_universe_count: 200
guidance_wait_until: "14:30"
guidance_final_time: "14:50"
guidance_min_stable_runs: 2
guidance_min_leader_runs: 2
guidance_min_score: 70
guidance_min_score_lead: 4
guidance_min_confidence: 35
guidance_min_utility: 0

# T+1 manual exit checkpoints; these values never route an order.
exit_open_stop_pct: -3
exit_time: "10:40"
exit_profit_protect_pct: 3
exit_pullback_pct: 2
