name: Monitor WP System

on:
  workflow_dispatch:
  schedule:
    # A second, offset cron registration provides a self-repair path when the
    # primary direct-Tushare WP workflow is delayed or dropped by GitHub.
    - cron: "3-58/5 1-3,5-7 * * 1-5"
    - cron: "58 4 * * 1-5"

permissions:
  actions: write
  contents: read

concurrency:
  group: wp-system-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check and repair WP system freshness
        run: python scripts/monitor_wp_system.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          WP_MONITOR_MAX_PAGE_LAG_MIN: "10"
