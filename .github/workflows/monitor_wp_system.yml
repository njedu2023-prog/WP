name: Monitor WP System

on:
  workflow_dispatch:
  schedule:
    # Exact Beijing trading windows converted to UTC.
    - cron: "25,35,45,55 1 * * 1-5"
    - cron: "5,15,25,35,45,55 2 * * 1-5"
    - cron: "5,15,25,35 3 * * 1-5"
    - cron: "55 4 * * 1-5"
    - cron: "5,15,25,35,45,55 5,6 * * 1-5"
    # 15:20/15:30 Beijing: consume a slow 15:10 upstream completion if direct dispatch is unavailable.
    - cron: "5,10,20,30 7 * * 1-5"

permissions:
  actions: write
  contents: read

concurrency:
  group: wp-system-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check and repair WP system freshness
        run: python scripts/monitor_wp_system.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          WP_REPAIR_TOKEN: ${{ secrets.WP_REPAIR_TOKEN || secrets.WP_TRIGGER_TOKEN || secrets.GH_PAT || secrets.PERSONAL_ACCESS_TOKEN }}
          WP_MONITOR_MAX_UPSTREAM_AGE_MIN: "25"
          WP_MONITOR_MAX_WP_AGE_MIN: "25"
          WP_MONITOR_MAX_PAGE_LAG_MIN: "20"
          WP_MONITOR_SESSION_GRACE_MIN: "25"
