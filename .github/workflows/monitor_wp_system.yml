name: Monitor WP System

on:
  workflow_dispatch:
  schedule:
    # A second, offset cron registration provides a self-repair path when the
    # primary WP polling workflow is delayed or dropped by GitHub scheduling.
    - cron: "6-56/5 1-3,5-7 * * 1-5"
    - cron: "56 4 * * 1-5"

permissions:
  actions: write
  contents: read

concurrency:
  group: wp-system-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check and repair WP system freshness
        run: python scripts/monitor_wp_system.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          WP_REPAIR_TOKEN: ${{ secrets.WP_REPAIR_TOKEN || secrets.WP_TRIGGER_TOKEN || secrets.GH_PAT || secrets.PERSONAL_ACCESS_TOKEN }}
          WP_MONITOR_MAX_UPSTREAM_AGE_MIN: "18"
          WP_MONITOR_MAX_WP_AGE_MIN: "18"
          WP_MONITOR_MAX_PAGE_LAG_MIN: "10"
          WP_MONITOR_SESSION_GRACE_MIN: "15"
