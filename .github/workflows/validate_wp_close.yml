name: Validate WP Close

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/trigger_wp_close_validation.txt
      - .github/workflows/validate_wp_close.yml
  schedule:
    # Offset retries at Beijing 15:17/15:32/15:47/16:07. The trigger file is
    # the independent recovery path when GitHub drops a scheduled event.
    - cron: "17,32,47 7 * * 1-5"
    - cron: "7 8 * * 1-5"

permissions:
  contents: write

concurrency:
  group: wp-close-validation
  cancel-in-progress: false

jobs:
  validate-close:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate pending plans with next-day close
        run: python scripts/run_wp_close_validation.py
        env:
          PYTHONPATH: src
          WP_MODE: live
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
