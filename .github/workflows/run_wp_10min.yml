name: Run WP 10min

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest
      start_date:
        description: "回测开始日期 YYYYMMDD"
        required: false
        type: string
      end_date:
        description: "回测结束日期 YYYYMMDD"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/run_wp_session.py
      - .github/workflows/run_wp_10min.yml
      - requirements.txt
      - pyproject.toml
  schedule:
    # Beijing time startup guards. The runner stays alive across the lunch break
    # and loops every 10 minutes until the A-share close window ends.
    - cron: "8,18,28 1 * * 1-5"
    # Afternoon fallback only, in case all morning startup guards were delayed or dropped.
    - cron: "38,48,58 4 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wp-session-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-wp:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP session
        run: python scripts/run_wp_session.py
        env:
          PYTHONPATH: src
          WP_MODE: ${{ github.event.inputs.mode || 'live' }}
          WP_BACKTEST_START: ${{ github.event.inputs.start_date }}
          WP_BACKTEST_END: ${{ github.event.inputs.end_date }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WP_SESSION_INTERVAL_SECONDS: "600"
