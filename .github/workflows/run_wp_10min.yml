name: Run WP 10min

on:
  repository_dispatch:
    types:
      - wp_data_ready
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest
      start_date:
        description: "Backtest start date YYYYMMDD"
        required: false
        type: string
      end_date:
        description: "Backtest end date YYYYMMDD"
        required: false
        type: string
      force_rebuild:
        description: "Rebuild even when upstream data is unchanged"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/build_direct_rank_input.py
      - scripts/check_upstream_revision.py
      - scripts/run_wp_session.py
      - scripts/trigger_wp_run.txt
      - .github/workflows/run_wp_10min.yml
      - requirements.txt
      - pyproject.toml
  schedule:
    # Five-minute heartbeats tolerate GitHub cron delay. The lightweight gate
    # maps each start to the latest required Beijing-time market-data slot.
    - cron: "1-56/5 1-3,5-7 * * 1-5"
    - cron: "56 4 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Live ranking and next-day validation both commit generated outputs.
  group: wp-output-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-wp:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - name: Resolve direct data slot
        id: upstream
        run: python scripts/check_upstream_revision.py
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
      - name: Checkout upstream processor
        id: upstream-code
        if: steps.upstream.outputs.should_run == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'live')
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: njedu2023-prog/a-share-top3-data
          ref: main
          path: upstream
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: |
            scripts
            requirements.txt
          sparse-checkout-cone-mode: false
      - name: Record upstream processor revision
        id: upstream-revision
        if: steps.upstream-code.outcome == 'success'
        run: echo "sha=$(git -C upstream rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        if: steps.upstream.outputs.should_run == 'true'
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        if: steps.upstream.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP update
        if: steps.upstream.outputs.should_run == 'true'
        run: python scripts/run_wp_session.py
        env:
          PYTHONPATH: src
          WP_MODE: ${{ github.event.inputs.mode || 'live' }}
          WP_BACKTEST_START: ${{ github.event.inputs.start_date }}
          WP_BACKTEST_END: ${{ github.event.inputs.end_date }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WP_FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
          WP_DIRECT_SOURCE_ENABLED: "1"
          WP_UPSTREAM_WORKTREE: "${{ github.workspace }}/upstream"
          WP_UPSTREAM_PROCESSOR_REVISION: ${{ steps.upstream-revision.outputs.sha }}
          WP_TARGET_SLOT: ${{ steps.upstream.outputs.target_slot }}
          WP_DIRECT_TIMEOUT_SECONDS: "1500"
          WP_SCHEDULE_GRACE_SECONDS: "600"
          WP_RUN_MODE: "once"
