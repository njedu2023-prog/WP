name: Run WP 10min

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest
      start_date:
        description: "回测开始日期 YYYYMMDD"
        required: false
        type: string
      end_date:
        description: "回测结束日期 YYYYMMDD"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/run_wp_session.py
      - scripts/trigger_wp_run.txt
      - .github/workflows/run_wp_10min.yml
      - requirements.txt
      - pyproject.toml
  schedule:
    # A-share trading windows in Beijing time: 09:25-11:35 and 12:55-15:10.
    # GitHub cron is UTC, so these schedules are UTC+0.
    - cron: "25,35,45,55 1 * * 1-5"
    - cron: "5,15,25,35,45,55 2 * * 1-5"
    - cron: "5,15,25,35 3 * * 1-5"
    - cron: "55 4 * * 1-5"
    - cron: "5,15,25,35,45,55 5,6 * * 1-5"
    - cron: "5,10 7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wp-session-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-wp:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP update
        run: python scripts/run_wp_session.py
        env:
          PYTHONPATH: src
          WP_MODE: ${{ github.event.inputs.mode || 'live' }}
          WP_BACKTEST_START: ${{ github.event.inputs.start_date }}
          WP_BACKTEST_END: ${{ github.event.inputs.end_date }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WP_SCHEDULE_GRACE_SECONDS: "300"
          WP_RUN_MODE: "once"
