name: Run WP 10min

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 1-7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP
        run: python -m wp.main
        env:
          PYTHONPATH: src
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs logs data/cache
          git diff --cached --quiet || git commit -m "Update WP outputs"
          git push
