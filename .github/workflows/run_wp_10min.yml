name: Run WP 10min

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest
      start_date:
        description: "回测开始日期 YYYYMMDD"
        required: false
        type: string
      end_date:
        description: "回测结束日期 YYYYMMDD"
        required: false
        type: string
  schedule:
    - cron: "*/10 1-7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check A-share run window
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("Asia/Shanghai"))
          holidays = {
              "20260101",
              "20260216", "20260217", "20260218", "20260219", "20260220",
              "20260406",
              "20260501", "20260504", "20260505",
              "20260619",
              "20260925",
              "20261001", "20261002", "20261005", "20261006", "20261007", "20261008",
          }
          in_day = now.weekday() < 5 and now.strftime("%Y%m%d") not in holidays
          in_time = time(9, 25) <= now.time() <= time(11, 35) or time(12, 55) <= now.time() <= time(15, 10)
          if not (in_day and in_time):
              print(f"Skip outside A-share run window: {now:%Y-%m-%d %H:%M:%S}")
              with open(__import__("os").environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
                  handle.write("RUN_WP=0\n")
              raise SystemExit(0)
          print(f"Run window ok: {now:%Y-%m-%d %H:%M:%S}")
          with open(__import__("os").environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write("RUN_WP=1\n")
          PY
      - name: Install dependencies
        if: env.RUN_WP != '0'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP
        if: env.RUN_WP != '0'
        run: python -m wp.main
        env:
          PYTHONPATH: src
          WP_MODE: ${{ github.event.inputs.mode }}
          WP_BACKTEST_START: ${{ github.event.inputs.start_date }}
          WP_BACKTEST_END: ${{ github.event.inputs.end_date }}
      - name: Commit outputs through GitHub API
        if: env.RUN_WP != '0'
        run: python scripts/github_commit_paths.py "Update WP outputs" outputs logs data/cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
