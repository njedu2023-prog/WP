name: Run WP 10min

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest
      start_date:
        description: "回测开始日期 YYYYMMDD"
        required: false
        type: string
      end_date:
        description: "回测结束日期 YYYYMMDD"
        required: false
        type: string
  schedule:
    - cron: "*/10 1-7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP
        run: python -m wp.main
        env:
          PYTHONPATH: src
          WP_MODE: ${{ github.event.inputs.mode }}
          WP_BACKTEST_START: ${{ github.event.inputs.start_date }}
          WP_BACKTEST_END: ${{ github.event.inputs.end_date }}
      - name: Commit outputs through GitHub API
        run: python scripts/github_commit_paths.py "Update WP outputs" outputs logs data/cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
