name: Run WP 10min

on:
  repository_dispatch:
    types:
      - wp_data_ready
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest
      start_date:
        description: "Backtest start date YYYYMMDD"
        required: false
        type: string
      end_date:
        description: "Backtest end date YYYYMMDD"
        required: false
        type: string
      force_rebuild:
        description: "Rebuild even when upstream data is unchanged"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/run_wp_session.py
      - scripts/trigger_wp_run.txt
      - .github/workflows/run_wp_10min.yml
      - requirements.txt
      - pyproject.toml
  schedule:
    # repository_dispatch from fresh upstream data is primary. These UTC
    # schedules are an offset 10-minute fallback, not an independent clock.
    - cron: "32,42,52 1 * * 1-5"
    - cron: "2,12,22,32,42,52 2 * * 1-5"
    - cron: "2,12,22,32 3 * * 1-5"
    - cron: "2,12,22,32,42,52 5,6 * * 1-5"
    - cron: "2,12 7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wp-session-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-wp:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run WP update
        run: python scripts/run_wp_session.py
        env:
          PYTHONPATH: src
          WP_MODE: ${{ github.event.inputs.mode || 'live' }}
          WP_BACKTEST_START: ${{ github.event.inputs.start_date }}
          WP_BACKTEST_END: ${{ github.event.inputs.end_date }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WP_FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
          WP_SCHEDULE_GRACE_SECONDS: "600"
          WP_RUN_MODE: "once"
